    </header>

    <main class="doc-container">
        <h1>Contact Sales & Support</h1>
        <p>Whether you need volume Enterprise licensing, custom development, or technical support, our team is ready to help.</p>
        
        <form action="https://formsubmit.co/432db6a127d83f4c732cf64e13d89a62" method="POST" class="contact-form" id="contactForm">
            <!-- Anti-spam honeypot -->
            <input type="text" name="_honey" style="display:none">
            <!-- Disable captcha for a smoother experience -->
            <input type="hidden" name="_captcha" value="false">
            <!-- Email subject format -->
            <input type="hidden" name="_subject" value="New BIMetic Website Inquiry!">

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" class="form-control" required placeholder="John Doe">
            </div>
            
            <div class="form-group">
                <label for="email">Work Email</label>
                <input type="email" id="email" name="email" class="form-control" required placeholder="john@yourcompany.com">
            </div>

            <div class="form-group">
                <label for="topic">Topic</label>
                <select id="topic" name="topic" class="form-control" required>
                    <option value="" disabled selected>Select an option...</option>
                    <option value="Enterprise Sales">Enterprise Sales (Volume Seat Packs)</option>
                    <option value="Technical Support">Technical Support & Bug Reports</option>
                    <option value="Feature Request">Feature Request</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" class="form-control" required placeholder="How can we help you?"></textarea>
            </div>
            
            <button type="submit" class="btn-price btn-price-primary">Send Message</button>

            <p id="successMessage" style="display: none; color: #10b981; margin-top: 15px; font-weight: bold;">
                Message sent successfully! We will get back to you soon.
            </p>
        </form>
    </main>

    <script>
        // Check if the URL has ?success=true from FormSubmit redirect
        if (window.location.search.includes('success=true')) {
            document.getElementById('successMessage').style.display = 'block';
            // Clean up the URL
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    </script>
